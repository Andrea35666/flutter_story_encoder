name: flutter_story_encoder
description: A production-grade, hardware-accelerated video export engine for Flutter. Specifically designed for high-scale social media story editors requiring premium performance, thermal stability, and 4K capability.
version: 1.1.5
# Changelog for 1.1.2 (Audit fixes):
# - iOS Hotfix: Fixed color channel swap (Blue/Red) when encoding from Flutter raw RGBA frames.
# - iOS Stability: Fixed potential crash by resetting memory pools between encoding sessions.
# - Android Performance: Optimized silent audio track generation by reusing zero-buffers.
# Previous version: 1.1.1
homepage: https://github.com/lucasveneno/flutter_story_encoder
repository: https://github.com/lucasveneno/flutter_story_encoder
issue_tracker: https://github.com/lucasveneno/flutter_story_encoder/issues

environment:
  sdk: ">=3.10.7 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  pigeon: ^22.7.2
  build_runner: ^2.7.1
  mockito: ^5.5.0

flutter:
  plugin:
    platforms:
      android:
        package: com.lucasveneno.flutter_story_encoder
        pluginClass: FlutterStoryEncoderPlugin
      ios:
        pluginClass: FlutterStoryEncoderPlugin
